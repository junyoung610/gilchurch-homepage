<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>교인 수정</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />

    <script src="./js/sidebar-loader.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <!-- 사이드바 -->
      <div id="sidebar-container"></div>

      <main>
        <h1>교인 정보 수정</h1>

        <form id="memberForm">
          <label>이름</label>
          <input type="text" id="name" />

          <h3>소속 부서</h3>

          <label>
            <input type="checkbox" name="department" value="청년부" />
            청년부
          </label>

          <label>
            <input type="checkbox" name="department" value="찬양팀" />
            찬양팀
          </label>

          <label>
            <input type="checkbox" name="department" value="유초등부" />
            유초등부
          </label>

          <label>
            <input type="checkbox" name="department" value="중고등부" />
            중고등부
          </label>

          <label>
            <input type="checkbox" name="department" value="새가족부" />
            새가족부
          </label>

          <br /><br />

          <label>전화번호</label>
          <input type="text" id="phone" />

          <br /><br />

          <button type="submit">저장</button>
        </form>
      </main>
    </div>

    <script type="module" src="./js/edit-member.js"></script>
  </body>
</html>
