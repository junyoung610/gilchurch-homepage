<!doctype html>

    <title>관리자 대시보드</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

        <div class="sidebar-header">

            <div class="logo-sub">Church Management System</div>

          <button id="toggleSidebar">☰</button>
        </div>

        <div class="menu-group">
          <div class="group-title">🏠 대시보드</div>

          <a href="./dashboard.html">
            <span class="icon">🏠</span>
            <span class="menu-text"> 대시보드 </span>
          </a>
        </div>

        <div class="menu-group">
          <div class="group-title">📄 홈페이지 관리</div>

          <a href="./menu.html"> 메뉴설정 </a>

          <a href="./homepage.html"> 메인페이지관리 </a>

          <a href="./pages.html"> 페이지관리 </a>

          <a href="./boards.html"> 게시판관리 </a>

          <a href="./videos.html"> 영상관리 </a>

        <div class="menu-group">

          <a href="./users.html"> 회원관리 </a>

        <div class="menu-group">

          <a href="./attendance-report.html"> 출석통계 </a>
        </div>
      </aside>

      <main class="content">

          <div class="page-title">
            <h1>대시보드</h1>

            <p>교회 홈페이지 관리 시스템</p>
          </div>

          <div id="userInfo"></div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <h3>📄 페이지</h3>
            <div class="count" id="pageCount">0</div>
          </div>

          <div class="stat-card">
            <h3>📝 게시글</h3>
            <span id="postCount">0</span>
          </div>

          <div class="stat-card">
            <h3>🎬 영상</h3>
            <span id="videoCount">0</span>
          </div>

          <div class="stat-card">
            <h3>📂 메뉴</h3>
            <span id="menuCount">0</span>
          </div>

        <div class="dashboard-card">
          <h2>빠른 작업</h2>

          <div class="quick-actions">
            <a href="./homepage.html">메인페이지 관리</a>

            <a href="./pages.html">페이지 작성</a>

            <a href="./boards.html">게시글 작성</a>

            <a href="./videos.html">영상 등록</a>
