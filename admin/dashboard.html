<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>관리자 대시보드</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>관리자</h2>

        <ul>
          <li>
            <a href="./dashboard.html">
              <i data-lucide="layout-dashboard"></i>
              대시보드
            </a>
          </li>
          <li><a href="./menu.html">메뉴설정</a></li>
          <li><a href="./homepage.html"> 메인페이지관리 </a></li>
          <li><a href="./pages.html">페이지관리</a></li>
          <li><a href="./boards.html">게시판관리</a></li>
          <li><a href="./videos.html">영상관리</a></li>
          <li><a href="./settings.html">사이트설정</a></li>
          <li><a href="./users.html">회원관리</a></li>
          <li><a href="./members.html">교적관리</a></li>
        </ul>
      </aside>

      <main class="content">
        <div class="topbar">
          <div>
            <h1>대시보드</h1>
            <p>교회 홈페이지 관리 시스템</p>
          </div>

          <div class="user-panel">
            <div class="user-box">
              <div class="avatar">👤</div>

              <div id="userInfo"></div>
            </div>

            <button id="logoutBtn">로그아웃</button>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <h3>페이지</h3>
            <span id="pageCount">0</span>
          </div>

          <div class="stat-card">
            <h3>게시글</h3>
            <span id="postCount">0</span>
          </div>

          <div class="stat-card">
            <h3>영상</h3>
            <span id="videoCount">0</span>
          </div>

          <div class="stat-card">
            <h3>메뉴</h3>
            <span id="menuCount">0</span>
          </div>
        </div>

        <div class="dashboard-card">
          <h2>빠른 작업</h2>

          <div class="quick-actions">
            <a href="./homepage.html">메인페이지 관리</a>

            <a href="./pages.html">페이지 작성</a>

            <a href="./boards.html">게시글 작성</a>

            <a href="./videos.html">영상 등록</a>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
