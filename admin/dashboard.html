<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>관리자 대시보드</title>

    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />

    <script src="./js/sidebar-loader.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <div class="layout">
      <!-- 사이드바 -->
      <div id="sidebar-container"></div>

      <!-- 본문 -->

      <main class="content">
        <div class="topbar">
          <div class="page-title">
            <h1>대시보드</h1>
            <p>Church Management System</p>
          </div>

          <div id="userInfo"></div>
        </div>

        <!-- 통계 -->
        <div class="stats-grid">
          <div class="stat-card">
            <h3>📄 페이지</h3>

            <div class="count" id="pageCount">0</div>
          </div>

          <div class="stat-card">
            <h3>📝 게시글</h3>

            <div class="count" id="postCount">0</div>
          </div>

          <div class="stat-card">
            <h3>🎬 영상</h3>

            <div class="count" id="videoCount">0</div>
          </div>

          <div class="stat-card">
            <h3>📂 메뉴</h3>

            <div class="count" id="menuCount">0</div>
          </div>

          <div class="stat-card">
            <h3>👥 전체 교인</h3>
            <span id="memberCount" class="count">0</span>
          </div>

          <div class="stat-card">
            <h3>🆕 새가족</h3>
            <span id="newFamilyCount" class="count">0</span>
          </div>

          <div class="stat-card">
            <h3>✅ 오늘 출석</h3>
            <span id="todayAttendance" class="count">0</span>
          </div>

          <div class="stat-card">
            <h3>⏳ 승인 대기</h3>
            <span id="pendingUsers" class="count">0</span>
          </div>
        </div>

        <!-- 빠른 작업 -->
        <div class="dashboard-card">
          <h2>빠른 작업</h2>

          <div class="quick-actions">
            <a href="./homepage.html"> 메인페이지 관리 </a>
            <a href="./pages.html"> 페이지 작성 </a>
            <a href="./boards.html"> 게시글 작성 </a>
            <a href="./videos.html"> 영상 등록 </a>
            <a href="../index.html"> 홈페이지 </a>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
