<!doctype html>

    <title>관리자 대시보드</title>

    <link rel="stylesheet" href="./css/admin.css" />

  </head>

  <body>
    <div class="layout">
      <!-- 사이드바 -->

        <!-- 대시보드 -->
        <div class="menu-group">

            <span class="menu-text"> 대시보드 </span>
          </a>
        </div>

          <button class="menu-toggle">

            <a href="./settings.html">사이트설정</a>
          </div>
        </div>

        <!-- 교인 관리 -->
        <div class="menu-group">
          <button class="menu-toggle">
            <span>👥 교인 관리</span>
            <span>▾</span>
          </button>

        <div class="menu-group">
          <button class="menu-toggle">
            <span>📅 출석 관리</span>

          </button>

          </div>
        </div>
      </aside>

      <!-- 본문 -->

      <main class="content">
        ```
        <div class="topbar">
          <div class="page-title">
            <h1>대시보드</h1>

            <p>교회 홈페이지 관리 시스템</p>
          </div>

          <div id="userInfo"></div>
        </div>

        <!-- 통계 -->
        <div class="stats-grid">
          <div class="stat-card">
            <h3>📄 페이지</h3>

            <div class="count" id="pageCount">0</div>
          </div>

          <div class="stat-card">
            <h3>📝 게시글</h3>

            <div class="count" id="postCount">0</div>
          </div>

          <div class="stat-card">
            <h3>🎬 영상</h3>

            <div class="count" id="videoCount">0</div>
          </div>

          <div class="stat-card">
            <h3>📂 메뉴</h3>

            <div class="count" id="menuCount">0</div>
          </div>
        </div>

        <!-- 빠른 작업 -->
        <div class="dashboard-card">
          <h2>빠른 작업</h2>

          <div class="quick-actions">
            <a href="./homepage.html"> 메인페이지 관리 </a>

            <a href="./pages.html"> 페이지 작성 </a>

            <a href="./boards.html"> 게시글 작성 </a>
