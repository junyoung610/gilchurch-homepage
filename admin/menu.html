<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>메뉴설정</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/menupage.css" />

    <script src="./js/sidebar-loader.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <!-- 사이드바 -->
      <div id="sidebar-container"></div>

      <main>
        <div class="page-header">
          <h1>메뉴 관리</h1>
          <p>사이트 메뉴를 생성하고 관리합니다.</p>
        </div>
        <div class="menu-layout">
          <div class="card">
            <h2>메뉴 추가</h2>

            <form id="menuForm">
              <label>메뉴명</label>
              <input type="text" id="title" />

              <label>URL</label>
              <input type="text" id="url" />

              <label>메뉴 유형</label>

              <div class="radio-group">
                <label>
                  <input type="radio" name="type" value="main" checked />
                  메인메뉴
                </label>

                <label>
                  <input type="radio" name="type" value="sub" />
                  서브메뉴
                </label>
              </div>

              <label>상위 메뉴</label>

              <select id="parentMenu">
                <option value="">선택 안함</option>
              </select>

              <button type="submit">메뉴 추가</button>
            </form>
          </div>

          <div class="card">
            <h2>메뉴 목록</h2>

            <div id="menuList"></div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./js/menu.js"></script>
  </body>
</html>
