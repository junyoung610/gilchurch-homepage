<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>메뉴설정</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />

    <script src="./js/sidebar.js" defer></script>
    <script src="./js/sidebar-loader.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <!-- 사이드바 -->
      <div id="sidebar-container"></div>

      <main>
        <h1>메뉴설정</h1>

        <div class="form-group">
          <label>메뉴명</label>
          <input type="text" id="menuTitle" />
        </div>

        <div class="form-group">
          <label>URL</label>
          <input type="text" id="menuUrl" />
        </div>

        <div class="form-group">
          <label>순서</label>
          <input type="number" id="menuOrder" />
        </div>

        <button id="addMenuBtn">메뉴 추가</button>

        <hr />

        <div id="menuList"></div>
      </main>
    </div>

    <script type="module" src="./js/menu.js"></script>
  </body>
</html>
