<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>페이지관리</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/pages.css" />

    <script src="./js/sidebar-loader.js" defer></script>
    <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
  </head>
  <body>
    <div class="layout">
      <!-- 사이드바 -->
      <div id="sidebar-container"></div>

      <main class="content">
        <div class="page-header">
          <h1>페이지 관리</h1>
          <p>홈페이지 페이지를 생성하고 수정합니다.</p>
        </div>

        <div class="page-layout">
          <!-- 작성 -->
          <div class="card">
            <h2>페이지 작성</h2>

            <form id="pageForm">
              <label>페이지 제목</label>
              <input type="text" id="title" required />

              <label>Slug(URL)</label>
              <input type="text" id="slug" placeholder="history" required />

              <label>페이지 유형</label>

              <select id="pageType">
                <option value="normal">일반 페이지</option>

                <option value="board">게시판 페이지</option>
              </select>

              <div id="boardArea">
                <label>연결 게시판</label>

                <select id="boardSelect">
                  <option value="">게시판 없음</option>
                </select>
              </div>

              <label>내용</label>
              <textarea id="content"></textarea>

              <button type="submit">저장</button>
            </form>
          </div>

          <!-- 목록 -->
          <div class="card">
            <h2>페이지 목록</h2>

            <div id="pageList"></div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./js/pages.js"></script>
  </body>
</html>
