<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>페이지관리</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />

    <script src="./js/sidebar.js" defer></script>
    <script src="./js/sidebar-loader.js" defer></script>
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/7/tinymce.min.js"></script>
  </head>
  <body>
    <div class="layout">
      <!-- 사이드바 -->
      <div id="sidebar-container"></div>

      <main class="content">
        <div class="page-header">
          <h1>페이지 관리</h1>
          <p>홈페이지 페이지를 생성하고 수정합니다.</p>
        </div>

        <div class="page-layout">
          <div class="card">
            <h2>페이지 작성</h2>

            <form id="pageForm">
              <input type="text" id="title" placeholder="페이지 제목" />

              <input type="text" id="slug" placeholder="URL Slug" />

              <textarea id="content" rows="12"></textarea>

              <button type="submit">저장</button>
            </form>
          </div>

          <div class="card">
            <h2>페이지 목록</h2>

            <div id="pageList"></div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./js/pages.js"></script>
  </body>
</html>
