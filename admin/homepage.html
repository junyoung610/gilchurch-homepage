<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>메인페이지 관리</title>
    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/homepage.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />

    <script src="./js/sidebar-loader.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <!-- 사이드바 -->
      <div id="sidebar-container"></div>

      <main class="content">
        <h1>메인페이지 관리</h1>

        <section class="page-card">
          <div class="form-group">
            <label>메인 제목</label>
            <input type="text" id="heroTitle" />
          </div>

          <div class="form-group">
            <label>메인 설명</label>
            <textarea id="heroDescription"></textarea>
          </div>

          <div class="form-group">
            <label>버튼1 텍스트</label>
            <input type="text" id="heroButton1" />
          </div>

          <div class="form-group">
            <label>버튼1 링크</label>
            <input type="text" id="heroButton1Link" />
          </div>

          <div class="form-group">
            <label>버튼2 텍스트</label>
            <input type="text" id="heroButton2" />
          </div>

          <div class="form-group">
            <label>버튼2 링크</label>
            <input type="text" id="heroButton2Link" />
          </div>

          <div class="form-group">
            <label>배경 이미지</label>
            <input type="file" id="heroImage" />

            <div class="image-preview">
              <img id="preview" />
            </div>
          </div>

          <button id="saveBtn">저장</button>
        </section>
      </main>
    </div>

    <script type="module" src="./js/homepage.js"></script>
  </body>
</html>
