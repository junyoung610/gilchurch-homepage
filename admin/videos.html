<!doctype html>

<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <title>영상관리</title>

    <link rel="stylesheet" href="./css/admin.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />

    <script src="./js/sidebar-loader.js" defer></script>
  </head>

  <body>
    <div class="layout">
      <div id="sidebar-container"></div>

      <main class="content">
        <div class="page-header">
          <h1>영상관리</h1>
          <p>설교 영상을 등록하고 관리합니다.</p>
        </div>

        <div class="page-layout">
          <div class="card">
            <h2>영상 등록</h2>

            <form id="videoForm">
              <div class="form-group">
                <label>영상 제목</label>
                <input type="text" id="title" required />
              </div>

              <div class="form-group">
                <label>설교자</label>
                <input type="text" id="preacher" />
              </div>

              <div class="form-group">
                <label>성경본문</label>
                <input type="text" id="scripture" />
              </div>

              <div class="form-group">
                <label>설교일</label>
                <input type="date" id="date" />
              </div>

              <div class="form-group">
                <label>유튜브 URL</label>
                <input type="text" id="youtubeUrl" required />
              </div>

              <button type="submit">저장</button>
            </form>
          </div>

          <div class="card">
            <h2>등록된 영상</h2>

            <div id="videoList"></div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./js/videos.js"></script>
  </body>
</html>
