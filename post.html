<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <title>게시글</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <header id="header"></header>

    <main class="post-container">
      <div class="post-card">
        <div class="post-header">
          <h1 id="title"></h1>

          <div class="post-meta">
            <span> ✍️ <span id="writer"></span> </span>

            <span> 📅 <span id="date"></span> </span>

            <span> 👁️ <span id="views"></span> </span>
          </div>
        </div>

        <div id="content"></div>

        <div class="post-footer">
          <button class="list-btn" onclick="history.back()">목록으로</button>
        </div>
      </div>
    </main>

    <script type="module" src="./js/post.js"></script>
  </body>
</html>
