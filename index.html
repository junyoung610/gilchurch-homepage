<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <title id="siteTitle">Loading...</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header id="header"></header>

    <div id="noticeModal" class="notice-modal">
      <div class="notice-content">
        <div id="noticeSlider" class="notice-slider">
          <img id="noticeImg" src="" alt="공지사항" />

          <button id="noticePrev" class="notice-arrow left" style="display: none">‹</button>
          <button id="noticeNext" class="notice-arrow right" style="display: none">›</button>
          <div id="noticeDots" class="notice-dots"></div>
        </div>

        <div class="notice-footer">
          <label class="checkbox-label">
            <input type="checkbox" id="hideToday" />
            <span class="checkmark"></span>
            오늘 하루 보지 않기
          </label>
          <button id="closeNotice" class="close-btn">닫기</button>
        </div>
      </div>
    </div>

    <main>
      <section id="hero">
        <div class="hero-overlay">
          <h1 id="heroTitle">Loading...</h1>
          <p id="heroDescription">Loading...</p>

          <div class="hero-buttons">
            <a id="heroBtn1" href="#" class="btn"> 버튼1 </a>
            <a id="heroBtn2" href="#" class="btn secondary"> 버튼2 </a>
          </div>
        </div>

        <button id="prevBtn" class="slide-arrow left">‹</button>
        <button id="nextBtn" class="slide-arrow right">›</button>

        <div id="slideDots" class="slide-dots"></div>
      </section>

      <section id="about" class="section">
        <div class="container">
          <div class="section-header">
            <span>ABOUT CHURCH</span>

            <h2>교회 소개</h2>

            <p>예수 그리스도를 중심으로 함께 예배하고 성장하는 공동체</p>
          </div>

          <div class="about-grid">
            <div class="about-card">
              <h3>예배</h3>
              <p>하나님을 영화롭게 하는 예배 공동체</p>
            </div>

            <div class="about-card">
              <h3>양육</h3>
              <p>말씀 안에서 성장하는 공동체</p>
            </div>

            <div class="about-card">
              <h3>선교</h3>
              <p>세상 속에서 복음을 전하는 공동체</p>
            </div>
          </div>
        </div>
      </section>

      <section id="worship">
        <div class="container">
          <div id="worshipList"></div>
        </div>
      </section>

      <section id="worship" class="section">
        <div class="container">
          <div class="section-header">
            <span>WORSHIP</span>
            <h2>예배 안내</h2>
            <p>함께 예배하는 시간을 안내합니다.</p>
          </div>
          <div id="worshipList"></div>
        </div>
      </section>

      <section id="sermons" class="section">
        <div class="container">
          <div class="section-header">
            <span>SERMONS</span>
            <h2>최근 설교</h2>
          </div>
          <div id="sermonList"></div>
        </div>
      </section>

      <section id="news" class="section">
        <div class="container">
          <div class="section-header">
            <span>NEWS</span>
            <h2>교회 소식</h2>
          </div>
          <div id="newsList"></div>
        </div>
      </section>

      <section id="location" class="section">
        <div class="container">
          <div class="section-header">
            <span>LOCATION</span>
            <h2>오시는 길</h2>
            <p>교회로 오시는 길을 안내해 드립니다.</p>
          </div>
          <div class="map-container" style="margin-top: 40px">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.2709193214585!2d126.97697631563222!3d37.56653507980287!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca2eb421c44ad%3A0xe955b50cbfdafbc4!2z7ISc7Jq47Yq567OE7Iuc7LKt!5e0!3m2!1sko!2skr!4v1680000000000!5m2!1sko!2skr"
              width="100%"
              height="500"
              style="border: 0; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05)"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            >
            </iframe>
          </div>
        </div>
      </section>
    </main>

    <footer id="footer"></footer>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
